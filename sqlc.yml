version: "2"
sql:
  - engine: "sqlite"
    queries:
      - "./server/data/sql/queries"
    schema:
      - "./server/data/sql/migrations"
    gen:
      go:
        package: db
        out: "./server/infra/db"
        emit_json_tags: true
        emit_empty_slices: true
        json_tags_case_style: camel
        overrides:
          - column: "restaurants.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "restaurant_images.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "restaurant_images.restaurant_id"
            go_type: "github.com/google/uuid.UUID"
          - column: "users.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "visited_restaurants.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "visited_restaurants.restaurant_id"
            go_type: "github.com/google/uuid.UUID"
          - column: "sessions.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "sessions.user_id"
            go_type: "github.com/google/uuid.UUID"
          - column: "sessions.user_agent"
            go_type: "database/sql.NullString"
