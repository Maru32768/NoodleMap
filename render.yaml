
services:
  - type: web
    name: noodle-map-backend
    runtime: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
    branch: master
    region: oregon
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    pullRequestPreviewsEnabled: false
    disk:
      name: noodle-map-data
      mountPath: /work/db-data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /work/db-data/noodle_map.db
      - key: SERVER_PORT
        value: "80"
      - key: TOKEN_SECRET
        sync: false
      - key: AWS_REGION
        value: ap-northeast-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        value: noodle-map-bucket
      - key: S3_PREFIX
        value: db-backup

  - type: web
    runtime: static
    name: noodle-map-front
    rootDir: web
    buildCommand: npm run build
    staticPublishPath: build/client
    branch: master
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    domains:
      - noodle-map.marulab.jp
      - noodle-map.marulabs.dev
    headers:
      - path: /
        name: Cache-Control
        value: no-cache
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /admin
        name: Cache-Control
        value: no-cache
      - path: /admin/*
        name: Cache-Control
        value: no-cache
      - path: /admin/index.html
        name: Cache-Control
        value: no-cache
      - path: /manifest.webmanifest
        name: Cache-Control
        value: no-cache
      - path: /admin-manifest.webmanifest
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /api/*
        destination: https://noodle-map-backend.onrender.com/api/*
      - type: rewrite
        source: /admin
        destination: /admin/index.html
      - type: rewrite
        source: /admin/*
        destination: /admin/index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_GOOGLE_API_KEY
        sync: false
