services:
  server:
    image: noodle-map-server
    build:
      context: ./server
      dockerfile: Dockerfile
      target: builder
    entrypoint: ["/bin/sh", "/db/entrypoint.sh"]
    volumes:
      - ./db-data:/work/db-data
      - ./db:/db
    environment:
      - DB_PATH=/work/db-data/noodle_map.db
      - SERVER_PORT=8888
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - AUTH_COOKIE_SECURE=false
    ports:
      - "8888:8888"
    healthcheck:
      test: curl --fail localhost:8888/health || exit 1
      interval: 30s
      start_period: 30s
      start_interval: 1s

  front:
    image: noodle-map-front
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_API_KEY: ${VITE_GOOGLE_API_KEY}
        VITE_GOOGLE_OAUTH_CLIENT_ID: ${VITE_GOOGLE_OAUTH_CLIENT_ID}
    environment:
      - SERVER_ADDRESS=http://server:8888
    ports:
      - "8080:80"
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      server:
        condition: service_healthy
