openapi: 3.0.0
info:
  title: NoodleMap API
  version: 0.0.0
tags: []
paths:
  /api/v1/auth/google:
    post:
      operationId: googleAuth
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoogleAuthBadRequestErrorBody'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreationFailedErrorBody'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleAuthRequest'
  /api/v1/auth/logout:
    post:
      operationId: logout
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestErrorBody'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationRequiredErrorBody'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorBody'
  /api/v1/auth/me:
    get:
      operationId: me
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestErrorBody'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationRequiredErrorBody'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorBody'
  /api/v1/auth/shops:
    post:
      operationId: addShop
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shop'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddShopBadRequestErrorBody'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationRequiredErrorBody'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeniedErrorBody'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorBody'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddShopRequest'
  /api/v1/auth/shops/{id}:
    put:
      operationId: updateShop
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateShopBadRequestErrorBody'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationRequiredErrorBody'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeniedErrorBody'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorBody'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShopRequest'
  /api/v1/shops:
    get:
      operationId: listShops
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopsResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorBody'
components:
  schemas:
    AddShopBadRequestErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - invalid_request
        message:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/AddShopFieldError'
    AddShopField:
      type: string
      enum:
        - name
        - lat
        - lng
        - postalCode
        - address
        - closed
        - googlePlaceId
        - category
    AddShopFieldError:
      type: object
      required:
        - field
        - type
      properties:
        field:
          $ref: '#/components/schemas/AddShopField'
        type:
          $ref: '#/components/schemas/FieldErrorType'
        message:
          type: string
    AddShopRequest:
      type: object
      required:
        - name
        - lat
        - lng
        - postalCode
        - address
        - closed
        - googlePlaceId
        - category
      properties:
        name:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        postalCode:
          type: string
        address:
          type: string
        closed:
          type: boolean
        googlePlaceId:
          type: string
        category:
          $ref: '#/components/schemas/CategorySlug'
    AuthResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/User'
    AuthenticationRequiredErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - authentication_required
        message:
          type: string
    CategorySlug:
      type: string
      enum:
        - ramen
        - udon
    ErrorType:
      type: string
      enum:
        - invalid_request
        - authentication_required
        - permission_denied
        - google_auth_failed
        - session_creation_failed
        - internal_error
    FieldErrorType:
      type: string
      enum:
        - required
        - invalid_format
        - out_of_range
        - too_long
        - unknown
    GoogleAuthBadRequestErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - invalid_request
            - google_auth_failed
        message:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/GoogleAuthFieldError'
    GoogleAuthField:
      type: string
      enum:
        - credential
    GoogleAuthFieldError:
      type: object
      required:
        - field
        - type
      properties:
        field:
          $ref: '#/components/schemas/GoogleAuthField'
        type:
          $ref: '#/components/schemas/FieldErrorType'
        message:
          type: string
    GoogleAuthRequest:
      type: object
      required:
        - credential
      properties:
        credential:
          type: string
    InternalErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - internal_error
        message:
          type: string
    InvalidRequestErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - invalid_request
        message:
          type: string
    PermissionDeniedErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - permission_denied
        message:
          type: string
    SessionCreationFailedErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - session_creation_failed
        message:
          type: string
    Shop:
      type: object
      required:
        - id
        - name
        - lat
        - lng
        - closed
        - postalCode
        - address
        - googlePlaceId
        - visited
        - rate
        - favorite
        - category
      properties:
        id:
          $ref: '#/components/schemas/uuid'
        name:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        closed:
          type: boolean
        postalCode:
          type: string
        address:
          type: string
        googlePlaceId:
          type: string
        visited:
          type: boolean
        rate:
          type: number
          format: double
        favorite:
          type: boolean
        category:
          $ref: '#/components/schemas/CategorySlug'
    ShopsResponse:
      type: object
      required:
        - shops
      properties:
        shops:
          type: array
          items:
            $ref: '#/components/schemas/Shop'
    UpdateShopBadRequestErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - invalid_request
        message:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/UpdateShopFieldError'
    UpdateShopField:
      type: string
      enum:
        - name
        - lat
        - lng
        - postalCode
        - address
        - closed
        - googlePlaceId
        - category
        - visited
        - rate
        - favorite
    UpdateShopFieldError:
      type: object
      required:
        - field
        - type
      properties:
        field:
          $ref: '#/components/schemas/UpdateShopField'
        type:
          $ref: '#/components/schemas/FieldErrorType'
        message:
          type: string
    UpdateShopRequest:
      type: object
      required:
        - name
        - lat
        - lng
        - postalCode
        - address
        - closed
        - googlePlaceId
        - category
        - visited
        - rate
        - favorite
      properties:
        name:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        postalCode:
          type: string
        address:
          type: string
        closed:
          type: boolean
        googlePlaceId:
          type: string
        category:
          $ref: '#/components/schemas/CategorySlug'
        visited:
          type: boolean
        rate:
          type: number
          format: double
        favorite:
          type: boolean
    User:
      type: object
      required:
        - id
        - email
        - isAdmin
      properties:
        id:
          $ref: '#/components/schemas/uuid'
        email:
          type: string
        isAdmin:
          type: boolean
    uuid:
      type: string
      description: UUID serialized as a string.
servers:
  - url: /
    description: Current origin
    variables: {}
