openapi: 3.0.0
info:
  title: NoodleMap API
  version: 0.0.0
tags: []
paths:
  /api/v1/auth/google:
    post:
      operationId: googleAuth
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoogleAuthBadRequestErrorBody'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreationFailedErrorBody'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleAuthRequest'
  /api/v1/auth/logout:
    post:
      operationId: logout
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestErrorBody'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationRequiredErrorBody'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorBody'
  /api/v1/auth/me:
    get:
      operationId: me
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestErrorBody'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationRequiredErrorBody'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorBody'
  /api/v1/auth/restaurants:
    post:
      operationId: addRestaurant
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Restaurant'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddRestaurantBadRequestErrorBody'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationRequiredErrorBody'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeniedErrorBody'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorBody'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddRestaurantRequest'
  /api/v1/auth/restaurants/{id}:
    put:
      operationId: updateRestaurant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateRestaurantBadRequestErrorBody'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationRequiredErrorBody'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeniedErrorBody'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorBody'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRestaurantRequest'
  /api/v1/categories:
    get:
      operationId: listCategories
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoriesResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorBody'
  /api/v1/restaurants:
    get:
      operationId: listRestaurants
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantsResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorBody'
components:
  schemas:
    AddRestaurantBadRequestErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - invalid_request
        message:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/AddRestaurantFieldError'
    AddRestaurantField:
      type: string
      enum:
        - name
        - lat
        - lng
        - postalCode
        - address
        - closed
        - googlePlaceId
        - categories
    AddRestaurantFieldError:
      type: object
      required:
        - field
        - type
      properties:
        field:
          $ref: '#/components/schemas/AddRestaurantField'
        type:
          $ref: '#/components/schemas/FieldErrorType'
        message:
          type: string
    AddRestaurantRequest:
      type: object
      required:
        - name
        - lat
        - lng
        - postalCode
        - address
        - closed
        - googlePlaceId
        - categories
      properties:
        name:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        postalCode:
          type: string
        address:
          type: string
        closed:
          type: boolean
        googlePlaceId:
          type: string
        categories:
          type: array
          items:
            $ref: '#/components/schemas/uuid'
    AuthResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/User'
    AuthenticationRequiredErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - authentication_required
        message:
          type: string
    CategoriesResponse:
      type: object
      required:
        - categories
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    Category:
      type: object
      required:
        - id
        - label
        - icon
      properties:
        id:
          $ref: '#/components/schemas/uuid'
        label:
          type: string
        icon:
          type: string
    ErrorType:
      type: string
      enum:
        - invalid_request
        - authentication_required
        - permission_denied
        - google_auth_failed
        - session_creation_failed
        - internal_error
    FieldErrorType:
      type: string
      enum:
        - required
        - invalid_format
        - out_of_range
        - too_long
        - unknown
    GoogleAuthBadRequestErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - invalid_request
            - google_auth_failed
        message:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/GoogleAuthFieldError'
    GoogleAuthField:
      type: string
      enum:
        - credential
    GoogleAuthFieldError:
      type: object
      required:
        - field
        - type
      properties:
        field:
          $ref: '#/components/schemas/GoogleAuthField'
        type:
          $ref: '#/components/schemas/FieldErrorType'
        message:
          type: string
    GoogleAuthRequest:
      type: object
      required:
        - credential
      properties:
        credential:
          type: string
    InternalErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - internal_error
        message:
          type: string
    InvalidRequestErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - invalid_request
        message:
          type: string
    PermissionDeniedErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - permission_denied
        message:
          type: string
    Restaurant:
      type: object
      required:
        - id
        - name
        - lat
        - lng
        - closed
        - postalCode
        - address
        - googlePlaceId
        - visited
        - rate
        - favorite
        - categories
      properties:
        id:
          $ref: '#/components/schemas/uuid'
        name:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        closed:
          type: boolean
        postalCode:
          type: string
        address:
          type: string
        googlePlaceId:
          type: string
        visited:
          type: boolean
        rate:
          type: number
          format: double
        favorite:
          type: boolean
        categories:
          type: array
          items:
            $ref: '#/components/schemas/uuid'
    RestaurantsResponse:
      type: object
      required:
        - restaurants
      properties:
        restaurants:
          type: array
          items:
            $ref: '#/components/schemas/Restaurant'
    SessionCreationFailedErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - session_creation_failed
        message:
          type: string
    UpdateRestaurantBadRequestErrorBody:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - invalid_request
        message:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/UpdateRestaurantFieldError'
    UpdateRestaurantField:
      type: string
      enum:
        - name
        - lat
        - lng
        - postalCode
        - address
        - closed
        - googlePlaceId
        - visited
        - rate
        - favorite
    UpdateRestaurantFieldError:
      type: object
      required:
        - field
        - type
      properties:
        field:
          $ref: '#/components/schemas/UpdateRestaurantField'
        type:
          $ref: '#/components/schemas/FieldErrorType'
        message:
          type: string
    UpdateRestaurantRequest:
      type: object
      required:
        - name
        - lat
        - lng
        - postalCode
        - address
        - closed
        - googlePlaceId
        - visited
        - rate
        - favorite
      properties:
        name:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        postalCode:
          type: string
        address:
          type: string
        closed:
          type: boolean
        googlePlaceId:
          type: string
        visited:
          type: boolean
        rate:
          type: number
          format: double
        favorite:
          type: boolean
    User:
      type: object
      required:
        - id
        - email
        - isAdmin
      properties:
        id:
          $ref: '#/components/schemas/uuid'
        email:
          type: string
        isAdmin:
          type: boolean
    uuid:
      type: string
      description: UUID serialized as a string.
servers:
  - url: /
    description: Current origin
    variables: {}
